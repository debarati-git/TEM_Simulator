<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Column · TEM Simulator</title>
  <link rel="stylesheet" href="../assets/css/global.css" />
  <link rel="stylesheet" href="../assets/css/column.css" />
</head>
<body class="column-body">

  <div data-topnav data-module="column"></div>

  <main class="page page--column">

    <div class="column-page">

      <!-- ============= DIAGRAM VIEWPORT (left) ============= -->
      <section class="column-viewport" id="column-viewport">

        <div class="column-image-wrap" id="column-image-wrap">
          <img
            class="column-image"
            id="column-image"
            src="../assets/images/column/tem-column-anatomy.jpg"
            alt="Annotated cross-section of a transmission electron microscope column"
            draggable="false"
          />

          <!-- Animated electron beam — overlay aligned with the column axis -->
          <div class="column-beam" aria-hidden="true">
            <div class="column-beam__pulse"></div>
            <div class="column-beam__pulse column-beam__pulse--lag"></div>
          </div>

          <!-- Hotspots are injected here at runtime -->
          <div class="column-hotspots" id="column-hotspots" aria-hidden="false"></div>

          <!-- Floating zoom button over the top-right corner of the image -->
          <div class="column-viewport__controls">
            <button type="button" class="btn btn--ghost" id="zoom-open-btn" title="Open zoom view">
              <svg viewBox="0 0 16 16" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true">
                <circle cx="7" cy="7" r="5"/>
                <path d="M11 11l3.5 3.5M5 7h4M7 5v4"/>
              </svg>
              Zoom
            </button>
          </div>

          <!-- Caption: module tag + title, overlaying bottom-left of the image -->
          <div class="column-viewport__caption">
            <span class="tag tag--signal">MODULE 01 · ANATOMY</span>
            <span class="column-viewport__caption-text">Electron-Optical Column · Annotated</span>
          </div>
        </div>

      </section>

      <!-- ============= INFO PANEL (right) ============= -->
      <aside class="column-info" id="column-info">

        <!-- Detail card (top) -->
        <div class="column-info__detail">

          <!-- Empty state: shown until the first hover -->
          <div class="column-info__empty" data-info-empty>
            <div class="column-info__empty-mark">
              <svg viewBox="0 0 32 32" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.4" aria-hidden="true">
                <circle cx="16" cy="16" r="12"/>
                <path d="M16 10v8M16 22h.01"/>
              </svg>
            </div>
            <div class="column-info__empty-title">Hover or click a component</div>
            <div class="column-info__empty-sub">on the diagram or in the list below</div>
          </div>

          <!-- Detail content -->
          <div class="column-info__content" data-info-content hidden>
            <div class="column-info__eyebrow" data-info-eyebrow>COMPONENT</div>
            <h2 class="column-info__title" data-info-title></h2>
            <div class="column-info__role" data-info-role></div>
            <div class="column-info__body" data-info-body></div>
          </div>

        </div>

        <!-- Component list (bottom, always visible) -->
        <div class="column-info__list-wrap">
          <div class="column-info__list-heading">
            <span>COMPONENTS</span>
            <span class="column-info__list-count" data-info-progress>—</span>
          </div>
          <ul class="component-list" id="component-list"
              role="listbox" aria-label="Column components"></ul>
        </div>

      </aside>

    </div>

  </main>

  <!-- ============= ZOOM MODAL ============= -->
  <div class="zoom-modal" id="zoom-modal" role="dialog" aria-modal="true" aria-labelledby="zoom-title" hidden>
    <div class="zoom-modal__bg" data-zoom-close></div>

    <div class="zoom-modal__panel">

      <header class="zoom-modal__header">
        <div class="zoom-modal__title" id="zoom-title">
          <span class="tag tag--signal">ZOOM VIEW</span>
          <span class="zoom-modal__heading">TEM Column · Annotated</span>
        </div>

        <div class="zoom-modal__controls">
          <div class="zoom-modal__scale" id="zoom-scale">116%</div>
          <button type="button" class="zoom-btn" id="zoom-out-btn" title="Zoom out" aria-label="Zoom out">
            <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
              <path d="M3 8h10"/>
            </svg>
          </button>
          <button type="button" class="zoom-btn" id="zoom-reset-btn" title="Reset zoom" aria-label="Reset zoom">
            <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true">
              <path d="M3 3v4h4M13 13V9H9"/>
              <path d="M3.5 7a5 5 0 0 1 8.5-2M12.5 9a5 5 0 0 1-8.5 2"/>
            </svg>
          </button>
          <button type="button" class="zoom-btn" id="zoom-in-btn" title="Zoom in" aria-label="Zoom in">
            <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
              <path d="M3 8h10M8 3v10"/>
            </svg>
          </button>
          <button type="button" class="zoom-btn zoom-btn--close" id="zoom-close-btn" title="Close (Esc)" aria-label="Close" data-zoom-close>
            <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
              <path d="M4 4l8 8M12 4l-8 8"/>
            </svg>
          </button>
        </div>
      </header>

      <div class="zoom-modal__stage" id="zoom-stage">
        <img
          class="zoom-modal__image"
          id="zoom-image"
          src="../assets/images/column/tem-column-anatomy.jpg"
          alt="TEM column · zoomable"
          draggable="false"
        />
      </div>

      <footer class="zoom-modal__footer">
        <span class="zoom-modal__hint">
          <kbd>SCROLL</kbd> ZOOM &nbsp;·&nbsp;
          <kbd>DRAG</kbd> PAN &nbsp;·&nbsp;
          <kbd>ESC</kbd> CLOSE
        </span>
      </footer>

    </div>
  </div>

  <script src="../assets/js/global.js"></script>
  <script src="../data/components-data.js"></script>
  <script src="../assets/js/column.js"></script>
</body>
</html>
