<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Column · TEM Simulator</title>
  <link rel="stylesheet" href="../assets/css/global.css" />
  <link rel="stylesheet" href="../assets/css/column.css" />
</head>
<body>

  <div data-topnav data-module="column"></div>

  <main class="page">

    <div class="column-page">

      <header class="column-header">
        <div>
          <div class="tag tag--signal" style="margin-bottom: 8px;">MODULE 01</div>
          <h1 class="column-header__title">Anatomy of a TEM</h1>
        </div>
        <div class="column-header__sub">HOVER COMPONENTS · LEARN STRUCTURE</div>
      </header>

      <!-- 3D / diagram viewport -->
      <section class="column-viewport crosshair" id="column-viewport">

        <div class="column-viewport__placeholder">
          <div class="column-viewport__placeholder-mark">⌬</div>
          3D / DIAGRAM VIEWPORT
          <div style="margin-top: 8px; font-size: 0.7rem; opacity: 0.6;">
            To be populated in Phase 3
          </div>
        </div>

        <div class="column-viewport__controls">
          <button class="btn btn--ghost" disabled>ROTATE</button>
          <button class="btn btn--ghost" disabled>RESET</button>
        </div>

        <div class="column-viewport__caption">FIG. 01 · ELECTRON OPTICAL COLUMN</div>
      </section>

      <!-- Component info panel -->
      <aside class="column-info" id="column-info">
        <div class="column-info__empty">
          <div class="column-info__empty-mark"></div>
          Hover a component<br />to inspect it
        </div>

        <!-- Populated content (hidden until a hotspot is hovered) -->
        <template id="column-info-template">
          <div class="column-info__eyebrow">COMPONENT</div>
          <h2 class="column-info__title" data-info-title></h2>
          <div class="column-info__role" data-info-role></div>
          <div class="column-info__body" data-info-body></div>
        </template>
      </aside>

    </div>

  </main>

  <script src="../assets/js/global.js"></script>
  <script src="../assets/js/column.js"></script>
</body>
</html>
